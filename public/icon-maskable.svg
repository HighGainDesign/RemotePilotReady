<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon: full bleed background, content in safe zone (center 80%) -->
  <rect width="512" height="512" fill="#080e1a"/>
  <!-- Drone body (scaled to 80% safe zone: 51-461) -->
  <rect x="220" y="232" width="72" height="48" rx="12" fill="#4afc92"/>
  <!-- Arms -->
  <line x1="232" y1="244" x2="170" y2="194" stroke="#4afc92" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="280" y1="244" x2="342" y2="194" stroke="#4afc92" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="232" y1="268" x2="170" y2="318" stroke="#4afc92" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="280" y1="268" x2="342" y2="318" stroke="#4afc92" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <!-- Rotors -->
  <ellipse cx="170" cy="194" rx="42" ry="12" fill="#4afc92" opacity="0.35"/>
  <ellipse cx="342" cy="194" rx="42" ry="12" fill="#4afc92" opacity="0.35"/>
  <ellipse cx="170" cy="318" rx="42" ry="12" fill="#4afc92" opacity="0.35"/>
  <ellipse cx="342" cy="318" rx="42" ry="12" fill="#4afc92" opacity="0.35"/>
  <!-- Motor hubs -->
  <circle cx="170" cy="194" r="15" fill="#4afc92"/>
  <circle cx="342" cy="194" r="15" fill="#4afc92"/>
  <circle cx="170" cy="318" r="15" fill="#4afc92"/>
  <circle cx="342" cy="318" r="15" fill="#4afc92"/>
  <!-- Camera -->
  <circle cx="256" cy="284" r="12" fill="#080e1a" stroke="#4afc92" stroke-width="4"/>
  <!-- LED -->
  <circle cx="256" cy="232" r="6" fill="#fbbf24"/>
</svg>
